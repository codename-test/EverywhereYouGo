services:
  ego:
    build: .
    image: ego:1.0.0
    container_name: ego
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      WEB_PORT: "5000"
      DB_PATH: /app/data/ego.db
      LOG_LEVEL: INFO
    volumes:
      - ./ego_data:/app/data
      - ./ego_config:/app/config
      - ./ego_parsers:/app/parsers
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/parsers')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
