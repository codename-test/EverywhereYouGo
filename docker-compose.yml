version: '3'
services:
  ego:
    build:
      context: .
      dockerfile: Dockerfile
    image: ego:1.0.0
    container_name: ego
    environment:
      - TZ=Asia/Shanghai
      - WEB_PORT=5000
      - DB_PATH=/app/data/ego.db
      - LOG_LEVEL=INFO
    volumes:
      - ego_data:/app/data
      - ego_config:/app/config
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  ego_data:
  ego_config:
