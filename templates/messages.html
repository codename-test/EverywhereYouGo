{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">{{ _("msg.title") }}</h2>
        <div>
            <button class="btn btn-outline-warning me-2" onclick="flushQueue()" id="flushBtn">
                {{ _("msg.flush_queue") }} <span class="badge bg-warning text-dark" id="pendingBadge">0</span>
            </button>
            <button class="btn btn-outline-secondary" onclick="loadMessages()">{{ _("msg.refresh") }}</button>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <form class="row g-2 align-items-end" onsubmit="loadMessages();return false">
                <div class="col-auto">
                    <label class="form-label small mb-0">{{ _("msg.filter_source") }}</label>
                    <select class="form-select form-select-sm" id="filterSource">
                        <option value="">{{ _("common.all") }}</option>
                        {% for s in sources %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-auto">
                    <label class="form-label small mb-0">{{ _("msg.filter_status") }}</label>
                    <select class="form-select form-select-sm" id="filterStatus">
                        <option value="">{{ _("common.all") }}</option>
                        <option value="RECEIVED">RECEIVED</option>
                        <option value="PARSED">PARSED</option>
                        <option value="SENDING">SENDING</option>
                        <option value="PENDING">PENDING</option>
                        <option value="SUCCESS">SUCCESS</option>
                        <option value="FAILED">FAILED</option>
                        <option value="IGNORED">IGNORED</option>
                        <option value="DISCARDED">DISCARDED</option>
                        <option value="NO_MATCH">NO_MATCH</option>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="form-label small mb-0">{{ _("msg.filter_channel") }}</label>
                    <select class="form-select form-select-sm" id="filterChannel">
                        <option value="">{{ _("common.all") }}</option>
                        <option value="wecom">{{ _("msg.ch_wecom") }}</option>
                        <option value="wecom_app">{{ _("msg.ch_wecom_app") }}</option>
                        <option value="dingtalk">{{ _("msg.ch_dingtalk") }}</option>
                        <option value="bark">{{ _("msg.ch_bark") }}</option>
                        <option value="gotify">{{ _("msg.ch_gotify") }}</option>
                        <option value="pushdeer">{{ _("msg.ch_pushdeer") }}</option>
                        <option value="serverchan">{{ _("msg.ch_serverchan") }}</option>
                        <option value="custom">{{ _("msg.ch_custom") }}</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-primary">{{ _("msg.filter_btn") }}</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 批处理工具栏 -->
    <div class="mb-2" id="batchToolbar" style="display:none">
        <span class="me-2 small text-muted" id="selectedCount">{{ _("msg.selected_n").replace("{n}", "0") }}</span>
        <button class="btn btn-outline-warning btn-sm me-1" onclick="batchRetry('original')">{{ _("msg.batch_retry") }}</button>
        <button class="btn btn-outline-warning btn-sm me-1" onclick="batchRetry('rerender')" title="{{ _("msg.batch_rerender_title") }}">{{ _("msg.batch_rerender") }}</button>
        <button class="btn btn-outline-secondary btn-sm me-1" onclick="batchIgnore()">{{ _("msg.batch_ignore") }}</button>
        <button class="btn btn-outline-danger btn-sm me-1" onclick="batchDelete()">{{ _("msg.batch_delete") }}</button>
        <button class="btn btn-outline-light btn-sm" onclick="clearSelection()">{{ _("msg.clear_selection") }}</button>
    </div>

    <!-- 消息表格 -->
    <div class="table-responsive">
        <table class="table table-sm table-hover align-middle" id="msgTable">
            <thead class="table-light">
                <tr>
                    <th style="width:30px"><input type="checkbox" id="selectAll" onchange="toggleAll()"></th>
                    <th style="width:50px">ID</th>
                    <th style="width:80px">Trace</th>
                    <th style="width:80px">{{ _("msg.col_source") }}</th>
                    <th style="width:90px">{{ _("msg.col_status") }}</th>
                    <th>{{ _("msg.col_channel_result") }}</th>
                    <th style="width:140px">{{ _("msg.col_actions") }}</th>
                </tr>
            </thead>
            <tbody id="msgBody">
                <tr><td colspan="7" class="text-center text-muted">{{ _("common.loading") }}</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <nav>
        <ul class="pagination pagination-sm justify-content-center" id="pagination"></ul>
    </nav>
</div>

<script>
const PAGE_SIZE = 50;
let currentPage = 0;
let totalMessages = 0;

function loadMessages(page = 0) {
    currentPage = page;
    const params = new URLSearchParams({
        limit: PAGE_SIZE,
        offset: page * PAGE_SIZE,
        source_id: document.getElementById('filterSource').value,
        status: document.getElementById('filterStatus').value,
        channel_type: document.getElementById('filterChannel').value,
    });

    fetch('/api/messages?' + params)
        .then(r => r.json())
        .then(data => {
            totalMessages = data.total;
            document.getElementById('pendingBadge').textContent = data.pending;
            renderMessages(data.messages);
            renderPagination();
        });
}

function renderMessages(msgs) {
    const tbody = document.getElementById('msgBody');
    if (!msgs.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">' + t("msg.no_messages") + '</td></tr>';
        return;
    }
    tbody.innerHTML = msgs.map(m => {
        const statusClass = {
            'RECEIVED': 'secondary', 'PARSED': 'info', 'SENDING': 'warning',
            'PENDING': 'warning', 'SUCCESS': 'success', 'FAILED': 'danger',
            'IGNORED': 'secondary', 'DISCARDED': 'secondary', 'NO_MATCH': 'secondary'
        }[m.status] || 'secondary';
        const cr = parseChannelResults(m.channel_results);
        const trace = m.trace_id ? m.trace_id.substring(0, 8) : '?';
        let actions = '';
        if (m.status === 'FAILED') {
            actions += `<div class="btn-group btn-group-sm me-1">
                <button class="btn btn-outline-warning btn-sm" onclick="event.stopPropagation();retryMsg(${m.id},'original')" title="${t("msg.retry_original_title")}">↻</button>
                <button class="btn btn-outline-warning btn-sm dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" onclick="event.stopPropagation()"></button>
                <ul class="dropdown-menu"><li><a class="dropdown-item" href="#" onclick="retryMsg(${m.id},'rerender')">${t("msg.retry_rerender")}</a></li></ul>
            </div>`;
        }
        if (m.status === 'FAILED' || m.status === 'DISCARDED' || m.status === 'NO_MATCH') {
            actions += `<button class="btn btn-outline-secondary btn-sm me-1" onclick="event.stopPropagation();ignoreMsg(${m.id})" title="${t("msg.ignore_title")}">✓</button>`;
        }
        actions += `<button class="btn btn-outline-danger btn-sm" onclick="event.stopPropagation();deleteMsg(${m.id})" title="${t("msg.delete_title")}">✕</button>`;
        return `<tr onclick="toggleRow(${m.id})" style="cursor:pointer">
            <td onclick="event.stopPropagation()"><input type="checkbox" class="msg-select" value="${m.id}" onchange="updateBatchToolbar()"></td>
            <td>${m.id}</td>
            <td><code>${trace}</code></td>
            <td>${escHtml(m.source_name)||'?'}</td>
            <td><span class="badge bg-${statusClass}">${m.status}</span></td>
            <td class="small">${cr}</td>
            <td>${actions}</td>
        </tr>
        <tr id="detail-${m.id}" style="display:none">
            <td colspan="7" class="bg-dark small text-light">
                <div class="p-2">
                    <div class="mb-1"><b>Trace ID</b> <code>${escHtml(m.trace_id)}</code></div>
                    ${m.error ? '<div class="text-danger mb-1"><b>' + t("msg.error_label") + '</b> ' + escHtml(m.error) + '</div>' : ''}
                    <div class="mb-1"><b>${t("msg.time_label")}</b> ${m.created_at}</div>
                    ${m.sent_at ? '<div class="mb-1"><b>' + t("msg.sent_at_label") + '</b> ' + m.sent_at + '</div>' : ''}
                    ${m.dedup_key ? '<div class="mb-1"><b>' + t("msg.dedup_key_label") + '</b> ' + escHtml(m.dedup_key) + '</div>' : ''}
                    ${m.raw_body ? '<details class="mb-1"><summary><b>' + t("msg.raw_data") + '</b></summary><pre class="mt-1 p-2 rounded" style="max-height:200px;overflow:auto;font-size:12px;background:#1e1e1e;color:#d4d4d4;border:1px solid #333">' + escHtml(m.raw_body) + '</pre></details>' : ''}
                    ${m.msg_json ? '<details class="mb-1"><summary><b>' + t("msg.parsed_result") + '</b></summary><pre class="mt-1 p-2 rounded" style="max-height:200px;overflow:auto;font-size:12px;background:#1e1e1e;color:#d4d4d4;border:1px solid #333">' + escHtml(fmtJson(m.msg_json)) + '</pre></details>' : ''}
                    ${m.channel_results ? '<details class="mb-1"><summary><b>' + t("msg.channel_detail") + '</b></summary><pre class="mt-1 p-2 rounded" style="max-height:200px;overflow:auto;font-size:12px;background:#1e1e1e;color:#d4d4d4;border:1px solid #333">' + escHtml(fmtJson(m.channel_results)) + '</pre></details>' : ''}
                </div>
            </td>
        </tr>`;
    }).join('');
}

function parseChannelResults(cr) {
    if (!cr) return '-';
    try {
        const arr = JSON.parse(cr);
        return arr.map(r => {
            const icon = r.ok ? '✅' : '❌';
            return `${icon} ${r.ch_name}`;
        }).join(' ');
    } catch(e) { return cr; }
}

function toggleRow(id) {
    const row = document.getElementById('detail-' + id);
    if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
}

function retryMsg(id, mode) {
    mode = mode || 'original';
    const label = mode === 'rerender' ? t("msg.retry_rerender") : t("msg.retry_original_label");
    if (!confirm(label + t("msg.confirm_retry"))) return;
    fetch('/api/messages/' + id + '/retry?mode=' + mode, {method:'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.ok) loadMessages(currentPage);
            else alert(t("msg.retry_fail") + ' ' + (data.error || 'unknown'));
        });
}

function deleteMsg(id) {
    if (!confirm(t("msg.confirm_delete"))) return;
    fetch('/api/messages/' + id, {method:'DELETE'})
        .then(r => r.json())
        .then(() => loadMessages(currentPage));
}

function ignoreMsg(id) {
    if (!confirm(t("msg.confirm_ignore"))) return;
    fetch('/api/messages/' + id + '/ignore', {method:'POST'})
        .then(r => r.json())
        .then(() => loadMessages(currentPage));
}

function flushQueue() {
    fetch('/api/queue/flush', {method:'POST'})
        .then(r => r.json())
        .then(data => {
            alert(t("msg.flushed_n").replace("{n}", data.count));
            loadMessages(currentPage);
        });
}

// ── 批量操作 ──

function toggleAll() {
    const checked = document.getElementById('selectAll').checked;
    document.querySelectorAll('.msg-select').forEach(cb => cb.checked = checked);
    updateBatchToolbar();
}

function updateBatchToolbar() {
    const selected = document.querySelectorAll('.msg-select:checked');
    const toolbar = document.getElementById('batchToolbar');
    const count = document.getElementById('selectedCount');
    if (selected.length > 0) {
        toolbar.style.display = 'block';
        count.textContent = t("msg.selected_n").replace("{n}", selected.length);
    } else {
        toolbar.style.display = 'none';
    }
}

function getSelectedIds() {
    return Array.from(document.querySelectorAll('.msg-select:checked')).map(cb => parseInt(cb.value));
}

function batchRetry(mode) {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const label = mode === 'rerender' ? t("msg.retry_rerender") : t("msg.retry_original_label");
    if (!confirm(label + t("msg.confirm_batch_retry").replace("{n}", ids.length))) return;
    fetch('/api/messages/batch', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'retry', ids: ids, mode: mode})
    }).then(r => r.json()).then(data => {
        alert(t("msg.batch_result").replace("{ok}", data.ok).replace("{fail}", data.fail));
        clearSelection();
        loadMessages(currentPage);
    });
}

function batchDelete() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    if (!confirm(t("msg.confirm_batch_delete").replace("{n}", ids.length))) return;
    fetch('/api/messages/batch', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'delete', ids: ids})
    }).then(r => r.json()).then(data => {
        alert(t("msg.batch_deleted").replace("{n}", data.ok));
        clearSelection();
        loadMessages(currentPage);
    });
}

function batchIgnore() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    if (!confirm(t("msg.confirm_batch_ignore").replace("{n}", ids.length))) return;
    fetch('/api/messages/batch', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'ignore', ids: ids})
    }).then(r => r.json()).then(data => {
        alert(t("msg.batch_ignored").replace("{n}", data.ok));
        clearSelection();
        loadMessages(currentPage);
    });
}

function clearSelection() {
    document.querySelectorAll('.msg-select').forEach(cb => cb.checked = false);
    document.getElementById('selectAll').checked = false;
    updateBatchToolbar();
}

function renderPagination() {
    const pages = Math.ceil(totalMessages / PAGE_SIZE);
    const ul = document.getElementById('pagination');
    if (pages <= 1) { ul.innerHTML = ''; return; }
    let html = '';
    const start = Math.max(0, currentPage - 2);
    const end = Math.min(pages, currentPage + 3);
    for (let i = start; i < end; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
            <a class="page-link" href="#" onclick="loadMessages(${i});return false">${i + 1}</a></li>`;
    }
    ul.innerHTML = html;
}

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtJson(s) {
    try { return JSON.stringify(JSON.parse(s), null, 2); }
    catch(e) { return s; }
}

loadMessages();
</script>
{% endblock %}
