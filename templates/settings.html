{% extends "base.html" %}
{% block content %}
<h4><i class="bi bi-gear"></i> 系统设置</h4>
<div class="card"><div class="card-body">
<form id="settingsForm">
  <div class="mb-3">
    <label class="form-label">日志写入级别</label>
    <div class="form-text mb-1">低于此级别的日志不写入数据库。默认 DEBUG 记录全部，日志页面可另行筛选显示。</div>
    <select class="form-select" name="log_level">
      <option value="DEBUG" {{ 'selected' if config.log_level == 'DEBUG' }}>DEBUG</option>
      <option value="INFO" {{ 'selected' if config.log_level == 'INFO' }}>INFO</option>
      <option value="WARNING" {{ 'selected' if config.log_level == 'WARNING' }}>WARNING</option>
      <option value="ERROR" {{ 'selected' if config.log_level == 'ERROR' }}>ERROR</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label"><input type="checkbox" name="dnd_enabled" value="1" {{ 'checked' if config.dnd_enabled == '1' }}> 开启免打扰</label>
    <div class="row g-2 mt-1">
      <div class="col"><input class="form-control" name="dnd_start" value="{{ config.dnd_start }}" placeholder="开始时间 HH:MM"></div>
      <div class="col"><input class="form-control" name="dnd_end" value="{{ config.dnd_end }}" placeholder="结束时间 HH:MM"></div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存设置</button>
</form>
</div></div>
<p class="text-muted mt-2">版本: {{ version }}</p>

<div class="card mt-4">
  <div class="card-header">配置导出</div>
  <div class="card-body">
    <p class="text-muted small">导出全部配置（解析器代码嵌入 JSON），可用于备份或迁移到其他环境。</p>
    <button class="btn btn-outline-primary" onclick="exportAll()"><i class="bi bi-download"></i> 导出全部配置</button>
  </div>
</div>

<div class="card mt-4">
  <div class="card-header">配置导入</div>
  <div class="card-body">
    <p class="text-muted small">导入配置文件（由导出功能生成的 JSON）。导入前会触发预览。</p>
    <div class="mb-3">
      <input class="form-control" type="file" id="importFile" accept=".json">
    </div>
    <div class="mb-2">
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="importMode" id="modeInsert" value="insert" checked>
        <label class="form-check-label" for="modeInsert">插入模式（跳过已有）</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="importMode" id="modeOverwrite" value="overwrite">
        <label class="form-check-label" for="modeOverwrite">覆盖模式（更新已有）</label>
      </div>
    </div>
    <button class="btn btn-outline-warning" onclick="previewImport()" id="previewBtn"><i class="bi bi-eye"></i> 预览导入</button>
    <button class="btn btn-danger d-none ms-2" id="confirmImportBtn" onclick="confirmImport()"><i class="bi bi-check-lg"></i> 确认导入</button>
  </div>
</div>

<div id="importResult" class="mt-3 d-none"></div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('settingsForm').addEventListener('submit', function(e){
  e.preventDefault();
  var fd = new FormData(this);
  var data = {};
  fd.forEach(function(v,k){ data[k] = v; });
  data.dnd_enabled = data.dnd_enabled ? '1' : '0';
  fetch('/api/settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d.status=='ok') alert('保存成功'); });
});

function exportAll() {
  fetch('/api/export/all')
    .then(r => r.json())
    .then(data => {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ego_export_' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
    });
}

var _importData = null;

function previewImport() {
  var fileInput = document.getElementById('importFile');
  if (!fileInput.files.length) { alert('请先选择 JSON 文件'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      _importData = JSON.parse(e.target.result);
    } catch(err) {
      alert('JSON 解析失败: ' + err.message);
      return;
    }
    var mode = document.querySelector('input[name="importMode"]:checked').value;
    fetch('/api/import?dry_run=1&mode=' + mode, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(_importData)
    })
    .then(r => r.json())
    .then(function(d) {
      renderDiff(d);
    });
  };
  reader.readAsText(fileInput.files[0]);
}

function renderDiff(data) {
  var div = document.getElementById('importResult');
  div.classList.remove('d-none');
  var html = '<h5>导入预览</h5>';
  html += '<p class="text-muted small">模式: ' + (data.mode||'insert') + ' | 共 ' + countChanges(data.diff) + ' 项变更</p>';
  html += '<table class="table table-sm table-bordered"><thead><tr><th>类型</th><th>操作</th><th>条目</th></tr></thead><tbody>';
  for (var cat in (data.diff||{})) {
    var items = data.diff[cat] || [];
    items.forEach(function(item) {
      var icon = item.action=='insert' ? '🟢' : item.action=='update' ? '🟡' : item.action=='skip' ? '⚪' : '🔴';
      var label = item.name || item.key || item.id || '?';
      var deps = item.deps ? ' (' + item.deps.join(', ') + ')' : '';
      html += '<tr><td>' + cat + '</td><td>' + icon + ' ' + item.action + '</td><td>' + label + deps + '</td></tr>';
    });
  }
  html += '</tbody></table>';

  // 依赖警告
  if ((data.deps||{}).missing && data.deps.missing.length) {
    html += '<div class="alert alert-warning"><strong>依赖缺失：</strong><ul>';
    data.deps.missing.forEach(function(m) {
      html += '<li>source_channel id=' + m.id + '：缺失 ' + m.deps.join(', ') + '</li>';
    });
    html += '</ul></div>';
  }

  // 错误
  if (data.errors && data.errors.length) {
    html += '<div class="alert alert-danger"><strong>错误：</strong><ul>';
    data.errors.forEach(function(e) { html += '<li>' + e + '</li>'; });
    html += '</ul></div>';
  }

  // 已有摘要
  if (data.summary) {
    html += '<h6>执行结果</h6>';
    html += '<table class="table table-sm"><thead><tr><th>类型</th><th>新增</th><th>更新</th><th>跳过</th><th>错误</th></tr></thead><tbody>';
    for (var cat in data.summary) {
      var s = data.summary[cat];
      if (typeof s == 'object') {
        html += '<tr><td>' + cat + '</td><td>' + (s.inserted||0) + '</td><td>' + (s.updated||0) + '</td><td>' + (s.skipped||0) + '</td><td>' + (s.errors||0) + '</td></tr>';
      }
    }
    html += '</tbody></table>';
  }

  div.innerHTML = html;

  // 非 dry_run 或已有结果则隐藏确认按钮
  if (!data.dry_run) {
    document.getElementById('confirmImportBtn').classList.add('d-none');
  } else {
    document.getElementById('confirmImportBtn').classList.remove('d-none');
  }
}

function countChanges(diff) {
  var n = 0;
  for (var k in diff) { if (Array.isArray(diff[k])) n += diff[k].length; else n += Object.keys(diff[k]).length; }
  return n;
}

function confirmImport() {
  if (!_importData) { alert('请先预览'); return; }
  var mode = document.querySelector('input[name="importMode"]:checked').value;
  if (!confirm('确认执行导入？此操作不可撤销。')) return;
  fetch('/api/import?mode=' + mode, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(_importData)
  })
  .then(r => r.json())
  .then(function(d) {
    renderDiff(d);
  });
}
</script>
{% endblock %}
