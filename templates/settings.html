{% extends "base.html" %}
{% block content %}
<h4><i class="bi bi-gear"></i> 系统设置</h4>
<div class="card"><div class="card-body">
<form id="settingsForm">
  <div class="mb-3">
    <label class="form-label">日志写入级别</label>
    <div class="form-text mb-1">低于此级别的日志不写入数据库。默认 DEBUG 记录全部，日志页面可另行筛选显示。</div>
    <select class="form-select" name="log_level">
      <option value="DEBUG" {{ 'selected' if config.log_level == 'DEBUG' }}>DEBUG</option>
      <option value="INFO" {{ 'selected' if config.log_level == 'INFO' }}>INFO</option>
      <option value="WARNING" {{ 'selected' if config.log_level == 'WARNING' }}>WARNING</option>
      <option value="ERROR" {{ 'selected' if config.log_level == 'ERROR' }}>ERROR</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label"><input type="checkbox" name="dnd_enabled" value="1" {{ 'checked' if config.dnd_enabled == '1' }}> 开启免打扰</label>
    <div class="row g-2 mt-1">
      <div class="col"><input class="form-control" name="dnd_start" value="{{ config.dnd_start }}" placeholder="开始时间 HH:MM"></div>
      <div class="col"><input class="form-control" name="dnd_end" value="{{ config.dnd_end }}" placeholder="结束时间 HH:MM"></div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存设置</button>
</form>
</div></div>
<p class="text-muted mt-2">版本: {{ version }}</p>

<div class="card mt-4">
  <div class="card-header">备份</div>
  <div class="card-body">
    <p class="text-muted small">备份全部配置（解析器代码 + JSON 配置文件），打包为 ZIP。</p>
    <button class="btn btn-outline-primary" onclick="backupAll()"><i class="bi bi-download"></i> 下载备份</button>
  </div>
</div>

<div class="card mt-4">
  <div class="card-header">恢复</div>
  <div class="card-body">
    <p class="text-muted small">上传备份 ZIP 文件恢复配置。</p>
    <div class="mb-3">
      <input class="form-control" type="file" id="importFile" accept=".zip">
    </div>
    <button class="btn btn-outline-warning" onclick="previewImport()" id="previewBtn"><i class="bi bi-eye"></i> 预览恢复</button>
    <button class="btn btn-danger d-none ms-2" id="confirmImportBtn" onclick="confirmImport()"><i class="bi bi-check-lg"></i> 确认恢复</button>
  </div>
</div>

<div id="importResult" class="mt-3 d-none"></div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('settingsForm').addEventListener('submit', function(e){
  e.preventDefault();
  var fd = new FormData(this);
  var data = {};
  fd.forEach(function(v,k){ data[k] = v; });
  data.dnd_enabled = data.dnd_enabled ? '1' : '0';
  fetch('/api/settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d.status=='ok') alert('保存成功'); });
});

function backupAll() {
  // ZIP 包包含：config/*.json + parsers/*.py
  fetch('/api/backup')
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ego_backup_' + new Date().toISOString().slice(0,10) + '.zip';
      a.click();
    });
}

var _importData = null;

function previewImport() {
  var fileInput = document.getElementById('importFile');
  if (!fileInput.files.length) { alert('请先选择 ZIP 备份文件'); return; }
  var file = fileInput.files[0];
  var formData = new FormData();
  formData.append('file', file);
  var mode = document.querySelector('input[name="importMode"]:checked').value;
  fetch('/api/restore?dry_run=1&mode=' + mode, {
    method:'POST',
    body: formData
  })
  .then(r => r.json())
  .then(function(d) {
    _importData = d;
    renderDiff(d);
  })
  .catch(function(err) { alert('请求失败: ' + err.message); });
}

function renderDiff(data) {
  var div = document.getElementById('importResult');
  div.classList.remove('d-none');
  var html = '<h5>恢复预览</h5>';
  html += '<p class="text-muted small">ZIP 中包含以下内容：</p>';
  html += '<table class="table table-sm table-bordered"><thead><tr><th>类型</th><th>文件</th></tr></thead><tbody>';
  (data.config||[]).forEach(function(f) { html += '<tr><td>配置</td><td><code>' + f + '</code></td></tr>'; });
  (data.parsers||[]).forEach(function(f) { html += '<tr><td>解析器</td><td><code>' + f + '</code></td></tr>'; });
  html += '</tbody></table>';

  if (data.errors && data.errors.length) {
    html += '<div class="alert alert-danger"><strong>错误：</strong><ul>';
    data.errors.forEach(function(e) { html += '<li>' + e + '</li>'; });
    html += '</ul></div>';
  }

  div.innerHTML = html;

  if (!data.dry_run) {
    document.getElementById('confirmImportBtn').classList.add('d-none');
  } else {
    document.getElementById('confirmImportBtn').classList.remove('d-none');
  }
}

function confirmImport() {
  if (!_importData) { alert('请先预览'); return; }
  var mode = document.querySelector('input[name="importMode"]:checked').value;
  if (!confirm('确认执行恢复？当前配置将被覆盖，服务将重启。')) return;
  var fileInput = document.getElementById('importFile');
  var formData = new FormData();
  formData.append('file', fileInput.files[0]);
  fetch('/api/restore?mode=' + mode, {
    method:'POST',
    body: formData
  })
  .then(r => r.json())
  .then(function(d) {
    if (d.ok) {
      document.getElementById('importResult').innerHTML = '<div class="alert alert-success">恢复完成！服务正在重启...</div>';
      document.getElementById('confirmImportBtn').classList.add('d-none');
      setTimeout(function() { location.reload(); }, 3000);
    } else {
      document.getElementById('importResult').innerHTML = '<div class="alert alert-danger">恢复失败: ' + (d.error||'未知错误') + '</div>';
    }
  });
}
</script>
{% endblock %}
