{% extends "base.html" %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-inbox"></i> 数据源管理</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sourceModal" onclick="resetSourceForm()">
      <i class="bi bi-plus-lg"></i> 新建数据源
    </button>
</div>

<div id="sources-list"></div>

<!-- Modal -->
<div class="modal fade" id="sourceModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">数据源配置</h5>
      <button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="src-id">
      <div class="row g-3 mb-3">
        <div class="col-md-4"><label class="form-label">名称</label>
          <input class="form-control" id="src-name"></div>
        <div class="col-md-2"><label class="form-label">监听端口</label>
          <input class="form-control" type="number" id="src-port" min="1024" max="65535"></div>
        <div class="col-md-6"><label class="form-label">解析器</label>
          <div class="input-group">
            <select class="form-select" id="src-parser"><option value="">-- 选择 --</option>
              {% for p in parsers %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
            </select>
            <button class="btn btn-outline-info btn-sm" type="button" onclick="showAvailKeys()" title="展示解析器输出的变量名，点击可插入到条件表达式"><i class="bi bi-list-columns-reverse"></i> 变量</button>
          </div>
        </div>
      </div>
      <div id="avail-keys-panel" class="collapse mb-3">
        <div class="card card-body p-2" style="max-height:200px;overflow-y:auto;font-size:0.8rem;">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <strong>可用变量（点击复制）</strong>
            <small class="text-muted" id="avail-keys-count"></small>
          </div>
          <div id="avail-keys-list"></div>
        </div>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="src-enabled" checked>
        <label class="form-check-label">启用</label>
      </div>

      <hr><h6>通道绑定 <button class="btn btn-outline-primary btn-sm ms-2" onclick="addBindingRow()"><i class="bi bi-plus"></i></button>
        <div class="row g-2 mt-1 mb-1">
          <div class="col-md-3"><small class="text-muted">推送通道</small></div>
          <div class="col-md-3"><small class="text-muted">推送模板</small></div>
          <div class="col-md-2"><small class="text-muted">条件表达式</small></div>
          <div class="col-md-1"><small class="text-muted">优先级</small></div>
          <div class="col-md-1 text-center"><small class="text-muted">紧急</small></div>
          <div class="col-md-2 text-center"><small class="text-muted">操作</small></div>
      <div id="bindings-container"></div>

      <hr><h6>样本数据 <button class="btn btn-outline-secondary btn-sm ms-2" onclick="refreshSamples()"><i class="bi bi-arrow-repeat"></i> 刷新</button></h6>
      <div id="samples-list"><span class="text-muted">暂无样本数据</span></div>
      <div id="parse-result" class="mt-2" style="display:none;"></div>
      <div class="mt-2">
        <button class="btn btn-info btn-sm" onclick="testParse()"><i class="bi bi-play"></i> 测试解析</button>
        <button class="btn btn-warning btn-sm ms-1" onclick="testPush()"><i class="bi bi-send"></i> 测试推送</button>
        <button class="btn btn-secondary btn-sm ms-1" onclick="copyAIPrompt()"><i class="bi bi-clipboard"></i> 🤖 复制AI提示词</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
      <button class="btn btn-primary" onclick="saveSource()">保存</button>
    </div>
  </div></div>
</div>

{% endblock %}

{% block scripts %}
<script>
{% raw %}
let SOURCES = [];
{% endraw %}
let PARSERS = {{ parsers|tojson }};
let CHANNELS = {{ channels|tojson }};
let TEMPLATES = {{ templates|tojson }};
let SC_BINDINGS = {{ sc|tojson }};
{% raw %}
let samples = [];
let editId = null;

function resetSourceForm() {
  editId = null;
  document.getElementById('src-id').value = '';
  document.getElementById('src-name').value = '';
  document.getElementById('src-port').value = '';
  document.getElementById('src-parser').value = '';
  document.getElementById('src-enabled').checked = true;
  document.getElementById('bindings-container').innerHTML = '';
  document.getElementById('samples-list').innerHTML = '<span class="text-muted">暂无样本数据</span>';
  document.getElementById('parse-result').style.display = 'none';
  samples = [];
}
function loadSources() {
  fetch('/api/sources').then(r=>r.json()).then(data=>{
    SOURCES = data;
    renderSources();
  });
}
let sourceSortKey = '';
let sourceSortAsc = true;
let sourceFilters = {name: '', port: '', parser: ''};
function renderSources() {
  let data = SOURCES.slice();
  // Apply filters
  if (sourceFilters.name) data = data.filter(s => s.name.toLowerCase().includes(sourceFilters.name.toLowerCase()));
  if (sourceFilters.port) data = data.filter(s => String(s.port).includes(sourceFilters.port));
  if (sourceFilters.parser) data = data.filter(s => (s.parser_name||'').toLowerCase().includes(sourceFilters.parser.toLowerCase()));
  // Apply sort
  if (sourceSortKey) {
    data.sort((a,b) => {
      let va = a[sourceSortKey] || '';
      let vb = b[sourceSortKey] || '';
      if (typeof va === 'number' && typeof vb === 'number') return sourceSortAsc ? va - vb : vb - va;
      return sourceSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }
  let sortIcon = (key) => sourceSortKey === key ? (sourceSortAsc ? ' ↑' : ' ↓') : '';
  let filterInput = (key, ph) => `<input class="form-control form-control-sm" placeholder="${ph}" value="${sourceFilters[key]||''}" oninput="sourceFilters['${key}']=this.value;renderSources();">`;
  let html = `<div class="table-responsive"><table class="table table-sm table-hover mb-0">
    <colgroup>
      <col style="width:12%"><col style="width:6%"><col style="width:14%"><col style="width:34%"><col style="width:18%"><col style="width:7%"><col style="width:9%">
    </colgroup>
    <thead><tr>
      <th style="cursor:pointer;" onclick="if(sourceSortKey==='name'){sourceSortAsc=!sourceSortAsc;}else{sourceSortKey='name';sourceSortAsc=true;}renderSources();">名称${sortIcon('name')}</th>
      <th style="cursor:pointer;" onclick="if(sourceSortKey==='port'){sourceSortAsc=!sourceSortAsc;}else{sourceSortKey='port';sourceSortAsc=true;}renderSources();">端口${sortIcon('port')}</th>
      <th style="cursor:pointer;" onclick="if(sourceSortKey==='parser_name'){sourceSortAsc=!sourceSortAsc;}else{sourceSortKey='parser_name';sourceSortAsc=true;}renderSources();">解析器${sortIcon('parser_name')}</th>
      <th>条件</th>
      <th>通道</th>
      <th>状态</th>
      <th></th>
    </tr><tr>
      <th>${filterInput('name', '搜索名称')}</th>
      <th>${filterInput('port', '端口')}</th>
      <th>${filterInput('parser', '搜索解析器')}</th>
      <th></th><th></th><th></th><th></th>
    </tr></thead><tbody>`;
  data.forEach(s=>{
    let sc = SC_BINDINGS.filter(x=>x.source_id==s.id);
    let n = sc.length || 1;
    let srcCells = `<td rowspan="${n}"><strong>${s.name}</strong></td>
      <td rowspan="${n}"><code>${s.port}</code></td>
      <td rowspan="${n}">${s.parser_name||'<span class="text-muted">无</span>'}</td>`;
    let statusBadges = `<span class="badge bg-${s.enabled?'success':'secondary'}">${s.enabled?'运行中':'已停用'}</span>`;
    if (sc.length === 0) {
      html += `<tr>${srcCells}
        <td colspan="2" class="text-muted">无绑定</td>
        <td rowspan="1">${statusBadges}</td>
        <td rowspan="1" class="text-nowrap">
          <button class="btn btn-sm btn-outline-secondary" onclick="editSource(${s.id})"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-info" onclick="exportItem('source',${s.id})" title="导出"><i class="bi bi-download"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteSource(${s.id})"><i class="bi bi-trash"></i></button>
        </td></tr>`;
    } else {
      let n = sc.length;
      sc.forEach((b, i)=>{
        let ch = CHANNELS.find(y=>y.id==b.channel_id);
        let chName = ch ? ch.name : '?';
        let condText = b.condition_expr || '<span class="text-muted">(无条件)</span>';
        let extras = '';
        if (b.dedup_key_expr) extras += ' <span class="badge bg-info" title="去重窗口: '+b.dedup_window+'s">去重</span>';
        if (b.urgent) extras += ' <span class="badge bg-warning text-dark" title="紧急通道：DND 时段也推送">紧急</span>';
        let row = '';
        if (i === 0) {
          row = `<tr>${srcCells}
            <td style="font-size:0.85em;word-break:break-all;">${condText}</td>
            <td>${chName}${extras}</td>
            <td rowspan="${n}">${statusBadges}</td>
            <td rowspan="${n}" class="text-nowrap">
              <button class="btn btn-sm btn-outline-secondary" onclick="editSource(${s.id})"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-outline-info" onclick="exportItem('source',${s.id})" title="导出"><i class="bi bi-download"></i></button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteSource(${s.id})"><i class="bi bi-trash"></i></button>
            </td></tr>`;
        } else {
          row = `<tr>
            <td style="font-size:0.85em;word-break:break-all;">${condText}</td>
            <td>${chName}${extras}</td></tr>`;
        }
        html += row;
      });
    }
  });
  html += '</tbody></table></div>';
  if(!data.length) html='<div class="text-muted p-3">暂无数据源</div>';
  document.getElementById('sources-list').innerHTML = html;
}
function editSource(id) {
  let s = SOURCES.find(x=>x.id==id);
  if(!s) return;
  editId = id;
  document.getElementById('src-id').value = id;
  document.getElementById('src-name').value = s.name;
  document.getElementById('src-port').value = s.port;
  document.getElementById('src-parser').value = s.parser_id||'';
  document.getElementById('src-enabled').checked = s.enabled;
  // 加载绑定
  let bs = SC_BINDINGS.filter(x=>x.source_id==id);
  let bc = document.getElementById('bindings-container');
  bc.innerHTML = '';
  bs.forEach(b=>addBindingRow(b));
  // 样本
  refreshSamples();
  new bootstrap.Modal(document.getElementById('sourceModal')).show();
}
function deleteSource(id) {
  if(!confirm('确定删除此数据源？')) return;
  fetch('/api/sources/'+id,{method:'DELETE'}).then(()=>loadSources());
}
function saveSource() {
  let data = {
    name: document.getElementById('src-name').value,
    port: parseInt(document.getElementById('src-port').value),
    parser_id: document.getElementById('src-parser').value || null,
    enabled: document.getElementById('src-enabled').checked ? 1 : 0
  };
  if(!data.name||!data.port) return alert('请填写名称和端口');
  let method, url;
  if(editId) { method='PUT'; url='/api/sources/'+editId; }
  else { method='POST'; url='/api/sources'; }
  fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
  .then(r=>r.json()).then(async res=>{
    if(res.error) return alert(res.error);
    // 新建时把 editId 设回新 ID
    if(!editId && res.id) editId = res.id;
    // 保存绑定
    if(editId) await saveBindings(editId);
    bootstrap.Modal.getInstance(document.getElementById('sourceModal')).hide();
    // 刷新全部数据（包括绑定）
    fetch('/api/sources').then(r=>r.json()).then(sources=>{
      SOURCES = sources;
      // 同时刷新 SC_BINDINGS
      fetch('/api/sources/bindings').then(r=>r.json()).then(bindings=>{
        SC_BINDINGS = bindings;
        renderSources();
      }).catch(()=>renderSources());
    });
  });
}
function addBindingRow(data) {
  data = data || {channel_id:'',template_id:'',condition_expr:'',priority:0,urgent:0,dedup_key_expr:'',dedup_window:3600};
  let bc = document.getElementById('bindings-container');
  let wrapper = document.createElement('div');
  wrapper.className = 'binding-group mb-2';
  let chOpts = CHANNELS.map(c=>`<option value="${c.id}" ${c.id==data.channel_id?'selected':''}>${c.name}</option>`).join('');
  let tOpts = TEMPLATES.map(t=>`<option value="${t.id}" ${t.id==data.template_id?'selected':''}>${t.name}</option>`).join('');
  let urgentChecked = data.urgent ? 'checked' : '';
  let dedupKey = data.dedup_key_expr||'';
  let dedupWin = data.dedup_window||3600;
  let hasDedup = dedupKey ? true : false;
  // 主行
  let mainRow = document.createElement('div');
  mainRow.className = 'row g-2 align-items-end';
  mainRow.innerHTML = `<div class="col-md-3"><select class="form-select form-select-sm ch-sel">${chOpts}</select></div>
    <div class="col-md-3"><select class="form-select form-select-sm tpl-sel">${tOpts}</select></div>
    <div class="col-md-2"><input class="form-control form-control-sm cond" placeholder="条件表达式" value="${data.condition_expr||''}" title="留空=无条件。示例: event == 'library.new'"></div>
    <div class="col-md-1"><input class="form-control form-control-sm pri" type="number" placeholder="优先级" value="${data.priority||0}"></div>
    <div class="col-md-1 text-center"><div class="form-check d-inline-block mt-1"><input class="form-check-input urgent-chk" type="checkbox" ${urgentChecked} title="紧急：DND 时段也推"><label class="form-check-label"><small>🔥</small></label></div></div>
    <div class="col-md-2">
      <div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-info flex-grow-1" onclick="toggleDedup(this)" title="配置去重">${hasDedup?'⏱ '+dedupKey:'⏱ 去重'}</button>
        <button class="btn btn-sm btn-outline-danger" onclick="this.closest('.binding-group').remove()">&times;</button>
      </div>
    </div>`;
  wrapper.appendChild(mainRow);
  // 去重子行（默认折叠）
  let subRow = document.createElement('div');
  subRow.className = 'row g-2 mt-1';
  subRow.style.display = hasDedup ? 'flex' : 'none';
  subRow.innerHTML = `<div class="offset-md-6 col-md-3">
      <div class="d-flex align-items-center gap-2">
        <span class="text-nowrap small">去重键</span>
        <input class="form-control form-control-sm dedup-key" placeholder="event" value="${dedupKey}" title="可用 + 连接多个变量，全部符合时视为重复，如 event+Item.Type。留空=不去重">
      </div>
    </div>
    <div class="col-md-3">
      <div class="d-flex align-items-center gap-2">
        <span class="text-nowrap small">窗口时间(秒)</span>
        <input class="form-control form-control-sm dedup-window" type="number" value="${dedupWin}" title="窗口时间内，重复请求不记录不推送。例：3600秒=1小时">
      </div>
    </div>`;
  wrapper.appendChild(subRow);
  bc.appendChild(wrapper);
}
function toggleDedup(btn) {
  let sub = btn.closest('.binding-group').querySelector('.row.mt-1');
  if (sub) sub.style.display = sub.style.display === 'none' ? 'flex' : 'none';
}
function saveBindings(sourceId) {
  let groups = document.querySelectorAll('#bindings-container .binding-group');
  let items = [];
  groups.forEach(group=>{
    let chId = parseInt(group.querySelector('.ch-sel').value);
    let tId = parseInt(group.querySelector('.tpl-sel').value);
    let cond = group.querySelector('.cond').value;
    let pri = parseInt(group.querySelector('.pri').value)||0;
    let urg = group.querySelector('.urgent-chk').checked ? 1 : 0;
    let dk = group.querySelector('.dedup-key').value.trim();
    let dw = parseInt(group.querySelector('.dedup-window').value)||3600;
    if(!chId||!tId) return;
    items.push({channel_id:chId,template_id:tId,condition_expr:cond,priority:pri,urgent:urg,dedup_key_expr:dk,dedup_window:dw});
  });
  if(items.length===0) {
    // 全部删除：仍需通知后端清空
    return fetch('/api/sources/'+sourceId+'/channels',{method:'POST',
      headers:{'Content-Type':'application/json'},body:'[]'}).then(r=>r.json());
  }
  return fetch('/api/sources/'+sourceId+'/channels',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(items)}).then(r=>r.json());
}
function refreshSamples() {
  let sid = editId||document.getElementById('src-id').value;
  if(!sid) return;
  fetch('/api/sources/'+sid+'/samples?count=3').then(r=>r.json()).then(data=>{
    samples = data;
    let html = '';
    data.forEach((s,i)=>{
      let checked = (i===0) ? 'checked' : '';
      html += `<div class="card mb-2"><div class="card-body py-1">
        <div class="form-check">
          <input class="form-check-input sample-radio" type="radio" name="sampleSel" value="${i}" ${checked} id="sample-${i}">
          <label class="form-check-label w-100" for="sample-${i}">
            <small class="text-muted">样本 #${i+1}</small>
            <pre class="mb-0 small">${s.body.replace(/</g,'&lt;')}</pre>
          </label>
        </div></div></div>`;
    });
    document.getElementById('samples-list').innerHTML = html||'<span class="text-muted">暂无样本数据</span>';
  });
}
function getActiveSample() {
  let sel = document.querySelector('input[name=\"sampleSel\"]:checked');
  if (!sel) return null;
  return samples[parseInt(sel.value)];
}
function showAvailKeys() {
  let parserSel = document.getElementById('src-parser');
  let pid = parserSel.value;
  if (!pid) return alert('请先选择解析器');
  fetch('/api/parsers/'+pid+'/content').then(r=>r.json()).then(res=>{
    let panel = document.getElementById('avail-keys-panel');
    let list = document.getElementById('avail-keys-list');
    let count = document.getElementById('avail-keys-count');
    if (res.content) {
      // 从 return { ... } 块中提取 key
      let returnBlock = res.content.match(/return\s*\{([\s\S]*?)\}/);
      let keys = [];
      if (returnBlock) {
        let matches = returnBlock[1].matchAll(/"([^"]+)"/g);
        for (let m of matches) keys.push(m[1]);
      }
      // 去重
      keys = [...new Set(keys)];
      count.textContent = keys.length + ' 个变量（点击插入到条件表达式）';
      list.innerHTML = keys.map(k =>
        `<span class="badge bg-light text-dark border me-2 mb-2 py-2 px-3" style="cursor:pointer;font-size:0.9rem;" onclick="insertVarToCondition('${k}')">${k}</span>`
      ).join('');
    } else {
      count.textContent = '';
      list.innerHTML = '<span class="text-danger">读取解析器失败</span>';
    }
    new bootstrap.Collapse(panel, {toggle: false}).show();
  });
}
let activeCondInput = null;
document.addEventListener('focusin', function(e) {
  if (e.target.classList.contains('cond') || e.target.classList.contains('dedup-key')) activeCondInput = e.target;
});
function insertVarToCondition(varName) {
  let groups = document.querySelectorAll('#bindings-container .binding-group');
  if (groups.length === 0) {
    alert('请先添加通道绑定');
    return;
  }
  // 插入到当前激活的输入框（条件表达式或去重键）
  if (activeCondInput) {
    let start = activeCondInput.selectionStart;
    let end = activeCondInput.selectionEnd;
    let text = activeCondInput.value;
    activeCondInput.value = text.substring(0, start) + varName + text.substring(end);
    activeCondInput.focus();
    activeCondInput.setSelectionRange(start + varName.length, start + varName.length);
    activeCondInput.classList.add('bg-success', 'text-white');
    setTimeout(() => activeCondInput.classList.remove('bg-success', 'text-white'), 300);
    return;
  }
  // 没有激活的输入框则提示
  alert('请先点击要插入变量的输入框（条件表达式或去重键）');
}
function testParse() {
  let sid = editId||document.getElementById('src-id').value;
  let s = getActiveSample();
  if(!sid||!s) return alert('请先勾选一个样本');
  fetch('/api/sources/'+sid+'/test-parse',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(s)})
  .then(r=>r.json()).then(res=>{
    let el = document.getElementById('parse-result');
    el.style.display = 'block';
    if(res.ok) {
      el.innerHTML = `<div class="alert alert-success mb-0"><b>解析成功</b><pre class="mb-0 mt-1 small">${JSON.stringify(res.result,null,2).replace(/</g,'&lt;')}</pre></div>`;
    } else {
      el.innerHTML = `<div class="alert alert-danger mb-0"><b>解析失败</b><pre class="mb-0 mt-1 small">${res.error.replace(/</g,'&lt;')}</pre></div>`;
    }
  });
}
function testPush() {
  let sid = editId||document.getElementById('src-id').value;
  let s = getActiveSample();
  if(!sid||!s) return alert('请先勾选一个样本');
  fetch('/api/sources/'+sid+'/test-push',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(s)})
  .then(r=>r.json()).then(res=>{
    alert(res.ok?'推送成功':'推送失败，请查看日志');
  });
}
function copyAIPrompt() {
  let s = getActiveSample();
  if (!s) return alert('请先勾选一个样本');
  let parserName = document.getElementById('src-parser');
  let parserLabel = parserName.options[parserName.selectedIndex]?.text || '未选择';
  let sampleBody = s.body;
  let rawHeaders = s.headers ? JSON.stringify(s.headers, null, 2) : '{}';
  let rawQuery = s.query_params ? JSON.stringify(s.query_params, null, 2) : '{}';
  let prompt = `你是一个 Python 脚本生成器。请为下面的数据源编写一个解析器脚本。

## 要求

- 文件名：\`parsers/<数据源名称>.py\`（全小写，下划线分隔）
- 必须包含一个 \`parse(raw_body: bytes, headers: dict, query_params: dict) -> dict\` 函数
- 返回 dict 要求：
  - 分析样本数据，挑选所有有意义的字段，为每个字段定义一个简洁直观的变量名（如 \`name\`、\`event\`、\`media_type\`、\`year\`、\`overview\`、\`server_url\` 等）
  - 在解析器里用明确的赋值语句从 JSON 中提取每个字段（如 \`event = data["Event"]\`、\`name = data["Item"]["Name"]\`）

function _copyToClipboard(text) {
  // 直接弹手动复制框，不依赖任何自动复制 API
  showManualCopyModal(text);
}
function showManualCopyModal(text) {
  // 当 execCommand 失败时，弹出一个 Bootstrap 模态框让用户手动复制
  let existing = document.getElementById('manual-copy-modal');
  if (existing) existing.remove();
  let div = document.createElement('div');
  div.id = 'manual-copy-modal';
  div.className = 'modal fade';
  div.tabIndex = -1;
  div.innerHTML = '<div class="modal-dialog modal-lg"><div class="modal-content">' +
    '<div class="modal-header"><h5 class="modal-title">复制提示词</h5>' +
    '<button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>' +
    '<div class="modal-body"><p class="text-muted small">自动复制失败，请手动选中下方文本复制（Ctrl+C / ⌘C）：</p>' +
    '<textarea class="form-control" style="height:300px;font-size:12px;font-family:monospace;" readonly>' +
    text.replace(/</g,'&lt;').replace(/>/g,'&gt;') +
    '</textarea></div>' +
    '<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button></div></div></div>';
  document.body.appendChild(div);
  let modal = new bootstrap.Modal(div);
  modal.show();
  // 自动全选
  let ta = div.querySelector('textarea');
  if (ta) { ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length); }
}

function exportItem(type, id) {
  fetch('/api/export/' + type + '/' + id)
    .then(r => r.json())
    .then(data => {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = type + '_' + id + '.json';
      a.click();
    });
}
