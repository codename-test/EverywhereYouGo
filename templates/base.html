<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGo - {{ title }}</title>
<link rel="icon" href="data:,">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body { padding-top: 60px; background: #f5f7fa; }
.sidebar { position: fixed; top: 56px; bottom: 0; left: 0; width: 200px; background: #1e293b; overflow-y: auto; }
.sidebar .nav-link { color: #94a3b8; padding: 10px 20px; }
.sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #334155; }
.sidebar .nav-link i { margin-right: 8px; }
.main { margin-left: 200px; padding: 24px; }
.card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
pre { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 6px; font-size: 13px; max-height: 400px; overflow: auto; }
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1"><i class="bi bi-send"></i> EverywhereYouGo <small class="text-muted">EGo</small></span>
  </div>
</nav>
<div class="sidebar">
  <ul class="nav flex-column pt-3">
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'dashboard' }}" href="/"><i class="bi bi-speedometer2"></i>仪表盘</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'sources' }}" href="/sources"><i class="bi bi-inbox"></i>数据源</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'parsers' }}" href="/parsers"><i class="bi bi-code-slash"></i>解析器</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'channels' }}" href="/channels"><i class="bi bi-send-check"></i>推送通道</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'templates' }}" href="/templates"><i class="bi bi-file-text"></i>推送模板</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'messages' }}" href="/messages"><i class="bi bi-chat-dots"></i>消息记录</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'logs' }}" href="/logs"><i class="bi bi-journal"></i>系统日志</a></li>
    <li class="nav-item"><a class="nav-link {{ 'active' if active_page == 'settings' }}" href="/settings"><i class="bi bi-gear"></i>系统设置</a></li>
  </ul>
</div>
<div class="main">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
