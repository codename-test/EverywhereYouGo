<!DOCTYPE html>
<html lang="{{ lang|default('zh') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGo - {{ title }}</title>
<link rel="icon" href="data:,">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body { background: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { width: 360px; }
</style>
</head>
<body>
<div class="card login-card border-0 shadow">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <h4><i class="bi bi-send"></i> EverywhereYouGo</h4>
      <p class="text-muted">{{ _("login.token_prompt") }}</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="mb-3">
        <input type="password" class="form-control" name="token" placeholder="{{ _('login.token_placeholder') }}" autofocus required>
      </div>
      <button type="submit" class="btn btn-dark w-100">{{ _("login.btn") }}</button>
    </form>
  </div>
</div>
</body>
</html>
